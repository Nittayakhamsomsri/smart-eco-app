<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Eco - สมัครสมาชิก</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2D68C4; 
            --mint-green: #D1FAE5; /* เขียวมิ้นต์พาสเทล */
            --white: #FFFFFF;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, var(--white) 0%, var(--mint-green) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-container {
            background-color: var(--white);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .logo-box img {
            width: 80px;
            margin-bottom: 10px;
        }

        h2 {
            color: var(--primary-blue);
            margin: 0 0 10px 0;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
            background-color: #f9f9ff;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background-color: #00b894; /* สีเขียวเพื่อให้ดูแตกต่างจากปุ่ม Login */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        .signup-btn:hover {
            background-color: #00967a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 184, 148, 0.3);
        }

        .back-to-login {
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .back-to-login a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="signup-container">
    <div class="logo-box">
        <img src="logo.png" alt="Logo">
    </div>
    <h2>สร้างบัญชีใหม่</h2>
    <div class="subtitle">มาร่วมเป็นส่วนหนึ่งในการช่วยโลกกับเรา</div>

    <form id="signupForm">
        <div class="input-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="fullname" placeholder="กรุณากรอกชื่อของคุณ" required>
        </div>

        <div class="input-group">
            <label>เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" placeholder="08x-xxx-xxxx" pattern="[0-9]{10}" title="กรุณากรอกเบอร์โทรศัพท์ 10 หลัก" required>
        </div>

        <div class="input-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="password" placeholder="ตั้งรหัสผ่านของคุณ" minlength="6" required>
        </div>

        <button type="submit" class="signup-btn">ยืนยันการสมัคร</button>
    </form>

    <div class="back-to-login">
        มีบัญชีอยู่แล้ว? <a href="index.html">เข้าสู่ระบบที่นี่</a>
    </div>
</div>

<script type="module">
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBQBpHijmAixJA5z2X1SiRsIvFT4-GIVIQ",
        authDomain: "smart-eco-app.firebaseapp.com",
        databaseURL: "https://smart-eco-app-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "smart-eco-app",
        storageBucket: "smart-eco-app.firebasestorage.app",
        messagingSenderId: "126722469073",
        appId: "1:126722469073:web:01d58d4373305fc36c29f0",
        measurementId: "G-MD69RZ6SEB"
    };

    // 2. Initialize Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. ฟังก์ชันสมัครสมาชิก
    document.getElementById('signupForm').onsubmit = function(event) {
        event.preventDefault();
        
        const name = document.getElementById('fullname').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;

        // บันทึกข้อมูลไปยัง Firebase
        set(ref(db, 'users/' + phone), {
            phone: phone,
            name: name,
            password: password,
            points: 0, 
            pic: "", // เตรียมฟิลด์รูปโปรไฟล์ไว้
            plastic_count: 0,
            metal_count: 0,
            role: 'user'
        }).then(() => {
            alert('ยินดีต้อนรับคุณ ' + name + ' สมัครสมาชิกสำเร็จแล้ว!');
            // ส่งไปหน้าอัปโหลดรูปพร้อมส่งเบอร์โทรศัพท์ไปด้วย
            window.location.href = 'upload_pic.html?phone=' + phone; 
        }).catch((error) => {
            console.error(error);
            alert('เกิดข้อผิดพลาด: ' + error.message);
        });
    }
</script>

</body>
</html>
