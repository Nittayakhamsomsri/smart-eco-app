<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Eco - My Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #2D68C4; --mint-green: #98FFD9; --white: #FFFFFF; --text-gray: #64748b; --success-green: #10b981; }
        body { font-family: 'Kanit', sans-serif; background: #e2e8f0; margin: 0; }
        .screen { width: 100%; max-width: 480px; min-height: 100vh; margin: 0 auto; background: #f8fafc; position: relative; padding-bottom: 80px; box-shadow: 0 0 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        .header { background: var(--primary-blue); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 25px 25px; position: relative; }
        .back-btn { position: absolute; top: 25px; left: 15px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 12px; border-radius: 10px; cursor: pointer; }

        .new-report-card { background: white; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .new-report-card h4 { margin: 0 0 12px 0; color: var(--primary-blue); display: flex; align-items: center; gap: 8px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; font-family: 'Kanit'; box-sizing: border-box; resize: none; margin-bottom: 10px; background: #f8fafc; }
        .btn-send-main { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; font-family: 'Kanit'; transition: 0.3s; }
        .btn-send-main:active { transform: scale(0.98); }

        .report-list { flex: 1; padding: 0 15px 20px; overflow-y: auto; }
        .list-title { margin: 10px 5px; font-size: 0.9rem; color: var(--text-gray); font-weight: 500; }
        
        .report-card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; position: relative; }
        .report-card:active { transform: scale(0.98); }
        .report-card.done { border-left: 5px solid var(--success-green); }
        
        .status-badge { float: right; font-size: 0.7rem; padding: 3px 10px; border-radius: 50px; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-done { background: #dcfce7; color: #166534; }

        .report-date { font-size: 0.75rem; color: #94a3b8; display: block; margin-top: 5px; }
        .report-msg { font-size: 0.9rem; color: #334155; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .title-done { color: var(--success-green) !important; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; flex-direction: column; }
        .chat-header { background: #f8fafc; padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f0f4f8; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .bubble-user { align-self: flex-end; background: var(--primary-blue); color: white; border-bottom-right-radius: 4px; }
        .bubble-admin { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .chat-time { font-size: 0.6rem; opacity: 0.7; display: block; margin-top: 4px; text-align: right; }

        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 15px; outline: none; font-family: 'Kanit'; }
        .send-btn { background: var(--primary-blue); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        .empty-state { text-align: center; margin-top: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="header">
            <button class="back-btn" onclick="location.href='user_home.html'">←</button>
            <h2 style="margin:0">⚠️ แจ้งปัญหา</h2>
            <small>แจ้งปัญหาการใช้งานและติดตามสถานะ</small>
        </div>

        <div class="new-report-card">
            <h4><span>✍️</span> แจ้งปัญหาใหม่</h4>
            <textarea id="new-report-text" rows="3" placeholder="พิมพ์รายละเอียดปัญหาที่คุณพบ..."></textarea>
            <button class="btn-send-main" onclick="window.submitNewReport()">ส่งรายงานให้แอดมิน</button>
        </div>

        <div class="list-title">📋 ประวัติการแจ้งของคุณ (คลิกเพื่อแชท)</div>
        <div id="report-container" class="report-list">
            <div class="empty-state">กำลังโหลดข้อมูล...</div>
        </div>
    </div>

    <div id="chat-modal" class="modal">
        <div class="chat-header">
            <button style="border:none; background:none; font-size:1.5rem;" onclick="window.closeChat()">✕</button>
            <div>
                <b id="chat-title" style="font-size:1rem; color:var(--primary-blue)">แชทกับแอดมิน</b>
                <div id="chat-status" style="font-size:0.7rem; color:gray">รอดำเนินการ</div>
            </div>
        </div>
        <div id="chat-content" class="chat-body"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="พิมพ์ข้อความตอบกลับ...">
            <button class="send-btn" onclick="window.sendMessage()">🚀</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBQBpHijmAixJA5z2X1SiRsIvFT4-GIVIQ", authDomain: "smart-eco-app.firebaseapp.com", databaseURL: "https://smart-eco-app-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "smart-eco-app", storageBucket: "smart-eco-app.firebasestorage.app", messagingSenderId: "126722469073", appId: "1:126722469073:web:01d58d4373305fc36c29f0" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const uid = sessionStorage.getItem('currentUserId');

        let currentReportId = null;

        // ฟังก์ชันแจ้งปัญหาใหม่
        window.submitNewReport = async () => {
            const text = document.getElementById('new-report-text').value.trim();
            if (!text) return alert("กรุณากรอกรายละเอียดปัญหา");

            try {
                // ดึงชื่อ User
                const userSnap = await get(ref(db, `users/${uid}`));
                const userName = userSnap.exists() ? userSnap.val().name : "Unknown User";
                const currentTime = new Date().toLocaleString('th-TH');

                // 1. บันทึกลง Firebase
                const reportRef = ref(db, 'reports');
                const newReport = {
                    userId: uid,
                    userName: userName,
                    message: text,
                    date: currentTime,
                    status: 'รอดำเนินการ',
                    lastUpdate: currentTime
                };
                await push(reportRef, newReport);

                // 2. เชื่อมต่อกับ n8n Webhook
                const n8nUrl = "https://parichat1.app.n8n.cloud/webhook/d0ae5b9c-0359-473f-a017-1cb0f682b4e1";
                
                fetch(n8nUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userName: userName,
                        message: text,
                        time: currentTime,
                        status: 'รอดำเนินการ'
                    })
                }).then(response => {
                    console.log('n8n response:', response);
                }).catch(err => {
                    console.error('n8n error:', err);
                });

                document.getElementById('new-report-text').value = '';
                alert("ส่งรายงานเรียบร้อยแล้ว แอดมินจะได้รับแจ้งเตือนผ่าน LINE ทันทีครับ");
            } catch (e) {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
            }
        };

        // 1. โหลดรายการปัญหา
        onValue(ref(db, 'reports'), snap => {
            const data = snap.val();
            const cont = document.getElementById('report-container');
            if(data) {
                const myReports = Object.keys(data)
                    .map(key => ({ id: key, ...data[key] }))
                    .filter(r => r.userId === uid)
                    .reverse();

                if(myReports.length > 0) {
                    cont.innerHTML = myReports.map(r => {
                        const isDone = r.status === 'เสร็จสิ้น';
                        return `
                        <div class="report-card ${isDone ? 'done' : ''}" onclick="window.openChat('${r.id}', '${r.message.replace(/'/g, "\\'")}', '${r.status}')">
                            <span class="status-badge ${isDone ? 'status-done' : 'status-pending'}">${r.status}</span>
                            <b class="${isDone ? 'title-done' : ''}">หัวข้อ: แจ้งปัญหาการใช้งาน</b>
                            <span class="report-date">📅 ${r.date}</span>
                            <div class="report-msg">${r.message}</div>
                            <div style="font-size:0.7rem; color:var(--primary-blue); margin-top:10px;">คลิกเพื่อแชทตอบกลับ...</div>
                        </div>`;
                    }).join('');
                } else {
                    cont.innerHTML = `<div class="empty-state"><span>📭</span><br>คุณยังไม่เคยแจ้งปัญหาเข้ามา</div>`;
                }
            } else {
                cont.innerHTML = `<div class="empty-state"><span>📭</span><br>ไม่มีข้อมูลการแจ้งปัญหา</div>`;
            }
        });

        // 2. เปิดห้องแชท
        window.openChat = (id, title, status) => {
            currentReportId = id;
            document.getElementById('chat-modal').style.display = 'flex';
            const statusLabel = document.getElementById('chat-status');
            statusLabel.innerText = "สถานะ: " + status;
            statusLabel.style.color = (status === 'เสร็จสิ้น') ? '#10b981' : '#d97706';
            
            const chatContentRef = ref(db, `reports/${id}/messages`);
            onValue(chatContentRef, snap => {
                const msgs = snap.val();
                const chatBox = document.getElementById('chat-content');
                if(msgs) {
                    chatBox.innerHTML = Object.values(msgs).map(m => `
                        <div class="bubble ${m.sender==='user'?'bubble-user':'bubble-admin'}">
                            ${m.text}
                            <span class="chat-time">${m.time}</span>
                        </div>
                    `).join('');
                    chatBox.scrollTop = chatBox.scrollHeight;
                } else {
                    chatBox.innerHTML = `<div style="text-align:center; font-size:0.8rem; color:gray; margin-top:20px;">เริ่มการสนทนาในหัวข้อ: <br>"${title}"</div>`;
                }
            });
        };

        // 3. ส่งข้อความแชท
        window.sendMessage = () => {
            const input = document.getElementById('chat-input');
            if(!input.value.trim() || !currentReportId) return;

            const newMsg = {
                sender: 'user',
                text: input.value,
                time: new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})
            };

            push(ref(db, `reports/${currentReportId}/messages`), newMsg);
            update(ref(db, `reports/${currentReportId}`), { lastUpdate: new Date().toLocaleString() });
            input.value = '';
        };

        window.closeChat = () => { document.getElementById('chat-modal').style.display = 'none'; };
    </script>
</body>
</html>
